<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- Link with tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Link with CSS -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- link of Geist Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body class="bg-[#F8FAFC]">
   <header class="w-[80%] mx-auto">
    <h1 class="text-xl sm:text-3xl text-[#002C5C] font-bold mb-4">Job Application Tracker</h1>
    <div class="grid grid-cols-3 justify-between gap-5">

        <div class="bg-white rounded-xl border border-gray-100 px-4 py-2">
            <p class="text-[14px] text-[#323B49]">Total</p>
            <p id="total-count" class=" font-bold text-2xl text-[#002C5C]">0</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-100 px-4 py-2">
            <p  class="text-[14px] text-[#323B49]">Interview</p>
            <p id="interview-count" class="font-bold text-2xl text-green-500">0</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-100 px-4 py-2">
            <p class="text-[14px] text-[#323B49]">Rejected</p>
            <p id="rejected-count" class="font-bold text-2xl text-red-500">0</p>
        </div>

    </div>
   </header>
   <main class="space-y-6">
       <hr class="my-5 opacity-10">
    <section class="w-[80%] mx-auto space-y-6">
        <div class="flex justify-between">
            <h2 class="text-2xl font-bold text-[#002C5C]">Available Jobs<h2>
                 <p><span id="job-count">0</span> jobs</p>
        </div>

        <!-- card delete button -->
        <div class="btn-container flex gap-3.5 ">
            <button id="all" class="border border-gray-100 px-3 py-1 rounded-md text-white bg-linear-to-r from-blue-500 to-blue-700 cursor-pointer">All</button>
            <button id="interview" class="border border-gray-100 px-3 py-1 rounded-md bg-white cursor-pointer">Interview</button>
           <button id="rejected" class="border border-gray-100 px-3 py-1 rounded-md bg-white cursor-pointer">Rejected</button>
        </div>
    </section>

   
   </main>
    <script src="./JS/script.js"></script>
</body>
</html>
